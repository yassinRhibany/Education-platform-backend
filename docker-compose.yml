version: '3.8'

services:
  db:
    image: postgres:16 # سنستخدم أحدث نسخة مستقرة
    container_name: syria_edu_postgres
    restart: always
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: syria_edu_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

adminer:
  image: adminer
  container_name: edu-adminer
  restart: always
  ports:
    - "8080:8080"

volumes:
  postgres_data:
